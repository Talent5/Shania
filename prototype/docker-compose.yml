version: '3.8'

services:
  backend:
    build: ./backend
    container_name: adhf-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=sqlite:///data/users.db
    volumes:
      - backend-data:/app/data
      - ./backend/adhf_rf_model.pkl:/app/adhf_rf_model.pkl:ro
    networks:
      - adhf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: adhf-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - adhf-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  adhf-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
